<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظام القضايا</title>

<style>
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
  background:#0f172a;
  color:#fff;
  margin:0;
}
.container{padding:20px;max-width:1000px;margin:auto}
h1{margin-bottom:20px}
.card{background:rgba(255,255,255,0.05);padding:15px;border-radius:15px;margin-bottom:10px}
input,button{padding:10px;border-radius:10px;border:none;margin:5px}
button{background:#3b82f6;color:white;cursor:pointer}
</style>

</head>
<body>

<div class="container">
<h1>⚖️ نظام إدارة القضايا</h1>

<div class="card">
<input id="title" placeholder="اسم القضية">
<input id="client" placeholder="اسم العميل">
<button onclick="addCase()">إضافة</button>
</div>

<div class="card">
<input placeholder="بحث..." oninput="search(this.value)">
</div>

<div id="list"></div>
</div>

<!-- Firebase compat (مهم) -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>

// 🔥 إعداداتك جاهزة
const firebaseConfig = {
  apiKey: "AIzaSyC3y3x-Trn6IznevsDrsgjkOLvaapkmuiQ",
  authDomain: "alshikh-law.firebaseapp.com",
  projectId: "alshikh-law",
  storageBucket: "alshikh-law.firebasestorage.app",
  messagingSenderId: "320725230314",
  appId: "1:320725230314:web:2ba25d938fe28bc0c52d93"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let allCases = [];

function addCase(){
  const title = document.getElementById("title").value;
  const client = document.getElementById("client").value;

  if(!title || !client){
    alert("املأ البيانات");
    return;
  }

  db.collection("cases").add({
    title,
    client,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });
}

function render(data){
  allCases = data;
  const box = document.getElementById("list");
  box.innerHTML = "";

  data.forEach(c=>{
    box.innerHTML += `
      <div class="card">
        <b>${c.title || ""}</b><br>
        ${c.client || ""}
      </div>
    `;
  });
}

function search(q){
  q = q.toLowerCase();
  const filtered = allCases.filter(c =>
    (c.title || "").toLowerCase().includes(q) ||
    (c.client || "").toLowerCase().includes(q)
  );
  render(filtered);
}

// 🔥 تحميل مباشر
db.collection("cases")
.orderBy("createdAt","desc")
.onSnapshot(snapshot=>{
  const data = snapshot.docs.map(doc=>({
    id: doc.id,
    ...doc.data()
  }));
  render(data);
});

console.log("🔥 النظام شغال");

</script>

</body>
</html>
