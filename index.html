<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الشيخ القضائي | الإصدار الاحترافي</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;500;700&family=Amiri:wght@700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary-gold: #D4AF37;
            --dark-gold: #996515;
            --bg-dark: #0f1116;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #e0e0e0;
            --accent: #bc9c22;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at top right, #1a1d24, #0a0c10);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* تأثير الزجاج المتطور */
        .glass-panel {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        /* الهيدر الرئيسي */
        header {
            padding: 30px;
            text-align: center;
            border-bottom: 2px solid var(--primary-gold);
            margin-bottom: 40px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        }

        header h1 {
            font-family: 'Amiri', serif;
            font-size: 2.5rem;
            color: var(--primary-gold);
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            margin-bottom: 10px;
        }

        /* شبكة الإحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 0 40px;
            margin-bottom: 40px;
        }

        .stat-card {
            padding: 25px;
            text-align: center;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .stat-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary-gold);
        }

        .stat-card i {
            font-size: 2.5rem;
            color: var(--primary-gold);
            margin-bottom: 15px;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            display: block;
        }

        /* منطقة المحتوى الرئيسية */
        .main-container {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
            padding: 0 40px 40px;
        }

        /* النماذج (Forms) */
        .form-section {
            padding: 25px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: white;
            border-radius: 8px;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        .btn-gold {
            background: linear-gradient(45deg, var(--dark-gold), var(--primary-gold));
            color: black;
            font-weight: 700;
            border: none;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-gold:hover {
            filter: brightness(1.2);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
        }

        /* الجدول الفاخر */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background: rgba(212, 175, 55, 0.1);
            color: var(--primary-gold);
            padding: 15px;
            text-align: right;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        tr:hover {
            background: rgba(212, 175, 55, 0.03);
        }

        /* أنيميشن الدخول */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-in {
            animation: fadeInUp 0.6s ease-out forwards;
        }

        @media (max-width: 992px) {
            .main-container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div class="animate-in">
            <h1><i class="fas fa-gavel"></i> منظومة الشيخ للخدمات القانونية</h1>
            <p>حلول تقنية ذكية لإدارة القضايا والتوكيلات</p>
        </div>
    </header>

    <div class="stats-grid">
        <div class="glass-panel stat-card animate-in" style="animation-delay: 0.1s">
            <i class="fas fa-briefcase"></i>
            <span class="stat-value" id="caseCount">0</span>
            <span>قضية نشطة</span>
        </div>
        <div class="glass-panel stat-card animate-in" style="animation-delay: 0.2s">
            <i class="fas fa-users"></i>
            <span class="stat-value" id="clientCount">0</span>
            <span>عميل مسجل</span>
        </div>
        <div class="glass-panel stat-card animate-in" style="animation-delay: 0.3s">
            <i class="fas fa-file-contract"></i>
            <span class="stat-value">١٢</span>
            <span>توكيل ساري</span>
        </div>
    </div>

    <main class="main-container">
        <aside class="glass-panel form-section animate-in" style="animation-delay: 0.4s">
            <h3 style="color: var(--primary-gold); margin-bottom: 20px;"><i class="fas fa-plus-circle"></i> إضافة قضية جديدة</h3>
            <form id="caseForm">
                <input type="text" placeholder="اسم العميل" required>
                <input type="text" placeholder="رقم القضية" required>
                <select>
                    <option>نوع القضية</option>
                    <option>جنائية</option>
                    <option>تجارية</option>
                    <option>أحوال شخصية</option>
                </select>
                <textarea rows="4" placeholder="ملخص القضية والطلبات..."></textarea>
                <button type="submit" class="btn-gold">حفظ في السحابة</button>
            </form>
        </aside>

        <section class="glass-panel animate-in" style="padding: 25px; animation-delay: 0.5s">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="color: var(--primary-gold);"><i class="fas fa-list-ul"></i> سجل القضايا الحديثة</h3>
                <input type="text" placeholder="بحث سريع..." style="width: 250px; margin: 0;">
            </div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>العميل</th>
                            <th>رقم القضية</th>
                            <th>الحالة</th>
                            <th>التاريخ</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="casesTable">
                        <tr>
                            <td>أحمد محمد</td>
                            <td>12345/ج</td>
                            <td><span style="color: #2ecc71;">قيد الترافع</span></td>
                            <td>2024/05/20</td>
                            <td>
                                <button style="background:none; border:none; color:var(--primary-gold); cursor:pointer;"><i class="fas fa-eye"></i></button>
                                <button style="background:none; border:none; color:#e74c3c; cursor:pointer; margin-right:10px;"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        // إعدادات الأنيميشن البسيطة للأرقام
        function animateValue(id, start, end, duration) {
            let obj = document.getElementById(id);
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                obj.innerHTML = Math.floor(progress * (end - start) + start);
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        // تشغيل عداد الأرقام عند التحميل
        window.onload = () => {
            animateValue("caseCount", 0, 142, 2000);
            animateValue("clientCount", 0, 85, 2000);
        };

        // ملاحظة للمطور: 
        // هنا يتم ربط الـ Firebase بنفس الطريقة السابقة 
        // لكن مع إضافة تأثيرات Loading بصيغة CSS قبل عرض البيانات.
    </script>
</body>
</html>
