<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>مكتب محمد عبدالمحسن الشيخ للمحاماة</title>
<!-- ① خط عربي فاخر -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<!-- Chart.js للرسوم البيانية -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --g:#D4AF37;--gd:#7A6200;--gl:rgba(212,175,55,0.15);
  --bg:#0A0C10;--bg2:#111418;--bg3:#181C24;
  --br:rgba(212,175,55,0.3);--br2:rgba(212,175,55,0.12);
  --tx:#EDE8E0;--tx2:#A09880;--tx3:#6B6450;
  --gold-glow:0 0 20px rgba(212,175,55,0.3);
}
/* ② وضع نهاري فاخر */
body.light{
  --bg:#F5F0E8;--bg2:#FFFDF8;--bg3:#EDE8DE;
  --br:rgba(122,98,0,0.3);--br2:rgba(122,98,0,0.12);
  --tx:#1A1510;--tx2:#6B5A3A;--tx3:#A09070;
  --g:#7A5800;--gd:#4A3400;--gl:rgba(122,88,0,0.1);
  --gold-glow:0 0 20px rgba(122,88,0,0.2);
}
body.light .auth{background:linear-gradient(135deg,#F5F0E8 0%,#EDE0C8 50%,#F0E8D8 100%)}
body.light .auth-box{background:rgba(255,253,248,0.95);backdrop-filter:blur(20px)}
body.light #particles-canvas{opacity:.3}

/* ① شاشة تحميل متحركة */
#loadingScreen{
  position:fixed;inset:0;background:#0A0C10;z-index:9999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity .8s ease, visibility .8s ease;
}
#loadingScreen.hide{opacity:0;visibility:hidden}
.ls-logo{
  width:90px;height:90px;
  background:linear-gradient(135deg,#D4AF37,#7A6200);
  border-radius:20px;display:flex;align-items:center;justify-content:center;
  font-size:42px;margin-bottom:1.5rem;
  animation:logoPulse 1.5s ease-in-out infinite;
  box-shadow:0 0 40px rgba(212,175,55,0.4);
}
.ls-title{font-family:'Amiri',serif;font-size:22px;color:#D4AF37;margin-bottom:.3rem;text-align:center}
.ls-sub{font-size:13px;color:#7A6200;margin-bottom:2rem;font-family:'Tajawal',sans-serif}
.ls-bar{width:200px;height:3px;background:rgba(212,175,55,0.2);border-radius:2px;overflow:hidden}
.ls-fill{height:100%;background:linear-gradient(90deg,#7A6200,#D4AF37,#7A6200);border-radius:2px;animation:loadFill 2s ease forwards}
.ls-dots{display:flex;gap:6px;margin-top:1rem}
.ls-dot{width:8px;height:8px;border-radius:50%;background:#D4AF37;animation:dotBounce .8s ease-in-out infinite}
.ls-dot:nth-child(2){animation-delay:.15s}
.ls-dot:nth-child(3){animation-delay:.3s}
@keyframes logoPulse{0%,100%{transform:scale(1);box-shadow:0 0 40px rgba(212,175,55,.4)}50%{transform:scale(1.05);box-shadow:0 0 60px rgba(212,175,55,.6)}}
@keyframes loadFill{0%{width:0}100%{width:100%}}
@keyframes dotBounce{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(-8px);opacity:1}}

/* ④ صفحة دخول مذهلة */
body{
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
.auth{
  position:fixed;inset:0;
  background:linear-gradient(135deg,#0A0C10 0%,#0F1218 40%,#0A0E15 100%);
  display:flex;align-items:center;justify-content:center;z-index:999;
  overflow:hidden;
}
#particles-canvas{position:absolute;inset:0;pointer-events:none}
.auth-glow{
  position:absolute;width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle,rgba(212,175,55,0.08) 0%,transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-50%);
  animation:glowPulse 4s ease-in-out infinite;
}
@keyframes glowPulse{0%,100%{opacity:.5;transform:translate(-50%,-50%) scale(1)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}}
.auth-box{
  width:420px;position:relative;z-index:2;
  background:rgba(17,20,24,0.85);
  backdrop-filter:blur(20px);
  border:1px solid rgba(212,175,55,0.25);
  border-radius:24px;padding:2.5rem;text-align:center;
  box-shadow:0 24px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(212,175,55,0.1);
  animation:authSlide .6s cubic-bezier(.34,1.56,.64,1);
}
@keyframes authSlide{from{opacity:0;transform:translateY(40px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.auth-emblem{
  width:80px;height:80px;margin:0 auto 1.2rem;
  background:linear-gradient(135deg,#D4AF37,#7A6200);
  border-radius:18px;display:flex;align-items:center;justify-content:center;
  font-size:36px;box-shadow:0 8px 32px rgba(212,175,55,.35);
  animation:logoPulse 3s ease-in-out infinite;
}
.auth-title{
  font-family:'Amiri',serif;font-size:22px;font-weight:700;
  color:#D4AF37;margin-bottom:.3rem;
  text-shadow:0 0 20px rgba(212,175,55,.4);
}
.auth-sub{font-size:12px;color:var(--tx2);margin-bottom:1.5rem;letter-spacing:.02em}
.auth-divider{display:flex;align-items:center;gap:10px;margin:.5rem 0 1.2rem;color:var(--tx3);font-size:11px}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--br2)}
.roles{display:flex;gap:6px;background:rgba(0,0,0,.3);border-radius:12px;padding:4px;margin-bottom:1.25rem;border:1px solid var(--br2)}
.role{flex:1;padding:8px;border-radius:9px;border:none;background:transparent;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;cursor:pointer;color:var(--tx2);transition:all .25s}
.role.on{background:linear-gradient(135deg,rgba(122,98,0,.8),rgba(90,68,0,.6));color:#D4AF37;box-shadow:0 2px 10px rgba(212,175,55,.2)}
.inp{
  width:100%;padding:11px 14px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--br2);border-radius:10px;
  color:var(--tx);font-family:'Tajawal',sans-serif;font-size:14px;
  margin-bottom:12px;outline:none;text-align:right;
  transition:all .2s;
}
.inp:focus{border-color:var(--g);background:rgba(212,175,55,.05);box-shadow:0 0 0 3px rgba(212,175,55,.1)}
.btn-login{
  width:100%;padding:13px;
  background:linear-gradient(135deg,#D4AF37,#7A6200);
  border:none;border-radius:11px;
  color:#0A0C10;font-family:'Tajawal',sans-serif;font-size:15px;font-weight:800;
  cursor:pointer;letter-spacing:.02em;
  box-shadow:0 4px 20px rgba(212,175,55,.35);
  transition:all .2s;position:relative;overflow:hidden;
}
.btn-login::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);opacity:0;transition:opacity .2s}
.btn-login:hover::before{opacity:1}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 6px 28px rgba(212,175,55,.45)}
.btn-login:active{transform:translateY(0)}
.err{color:#E07080;font-size:12px;margin-top:8px;min-height:18px}

/* App layout */
.app{display:none;height:100vh;overflow:hidden}
.app.on{display:flex}

/* Sidebar */
.sidebar{width:230px;min-width:230px;background:var(--bg2);border-left:1px solid var(--br2);display:flex;flex-direction:column;overflow-y:auto}
.logo-area{padding:1rem;border-bottom:1px solid var(--br2);display:flex;align-items:center;gap:10px}
.logo-ic{width:38px;height:38px;background:linear-gradient(135deg,var(--g),var(--gd));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;box-shadow:var(--gold-glow)}
.logo-tx{font-size:13px;font-weight:700;color:var(--g);line-height:1.3;font-family:'Amiri',serif}
.logo-tx small{display:block;font-size:10px;font-weight:400;color:var(--tx3);font-family:'Tajawal',sans-serif}
.user-box{margin:10px;padding:10px 12px;background:var(--bg3);border-radius:10px;border:1px solid var(--br2)}
.user-r{font-size:10px;color:var(--g);margin-bottom:2px;text-transform:uppercase;letter-spacing:.08em}
.user-n{font-size:13px;font-weight:700;color:var(--tx);font-family:'Amiri',serif}
.nav-grp{padding:8px 14px 3px;font-size:10px;color:var(--tx3);text-transform:uppercase;letter-spacing:.1em}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 14px;cursor:pointer;font-size:13px;color:var(--tx2);border-right:3px solid transparent;transition:all .2s}
.nav-item:hover{background:var(--bg3);color:var(--tx);padding-right:18px}
.nav-item.on{background:var(--gl);color:var(--g);border-right-color:var(--g);font-weight:700}
.nb{margin-right:auto;background:var(--gd);color:var(--g);font-size:10px;padding:1px 7px;border-radius:10px;font-weight:700}
.sb-foot{padding:10px;border-top:1px solid var(--br2);margin-top:auto}
.btn-out{width:100%;padding:8px;background:transparent;border:1px solid var(--br2);border-radius:8px;color:var(--tx2);font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.btn-out:hover{border-color:rgba(224,112,128,.4);color:#F09090;background:rgba(138,26,42,.1)}

/* Topbar */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--br2);display:flex;align-items:center;padding:0 1.25rem;gap:10px;flex-shrink:0;box-shadow:0 1px 20px rgba(0,0,0,.3)}
.pg-title{font-size:15px;font-weight:700;color:var(--tx);font-family:'Amiri',serif}
.tb-r{margin-right:auto;display:flex;gap:8px;align-items:center}
.ib{width:34px;height:34px;background:var(--bg3);border:1px solid var(--br2);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0;transition:all .2s}
.ib:hover{border-color:var(--g);box-shadow:var(--gold-glow)}
.fb-s{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--br2);border-radius:8px;padding:5px 10px}
.fb-d{width:8px;height:8px;border-radius:50%;background:#E07080;flex-shrink:0;transition:background .3s}
.fb-t{font-size:11px;color:var(--tx2);white-space:nowrap}
.tm-btn{width:52px;height:28px;background:var(--bg3);border:1px solid var(--br2);border-radius:14px;cursor:pointer;position:relative;flex-shrink:0;transition:all .2s}
.tm-btn::before{content:'';position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--g),var(--gd));transition:transform .35s cubic-bezier(.34,1.56,.64,1)}
body.light .tm-btn::before{transform:translateX(-24px)}

/* Content */
.content{flex:1;overflow-y:auto;padding:1.25rem;scrollbar-width:thin;scrollbar-color:var(--bg3) transparent}
.content::-webkit-scrollbar{width:5px}
.content::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:3px}
.sec{display:none}
.sec.on{display:block;animation:secFadeIn .3s ease}
@keyframes secFadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* Stats with counter animation */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.25rem}
.stat{
  background:var(--bg2);border:1px solid var(--br2);border-radius:14px;padding:1rem 1.2rem;
  transition:all .3s;position:relative;overflow:hidden;
}
.stat::before{content:'';position:absolute;top:0;right:0;width:60px;height:60px;background:radial-gradient(circle,var(--gl),transparent);border-radius:0 14px 0 60px;opacity:.5}
.stat:hover{border-color:var(--br);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,0,0,.3)}
.stat.hl{border-color:var(--br);background:linear-gradient(135deg,rgba(212,175,55,.08),rgba(122,98,0,.04))}
.stat-l{font-size:11px;color:var(--tx2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.stat-n{font-size:28px;font-weight:900;color:var(--tx);line-height:1;font-family:'Tajawal',sans-serif}
.stat.hl .stat-n{color:var(--g);text-shadow:0 0 20px rgba(212,175,55,.3)}
.stat-s{font-size:11px;color:var(--tx3);margin-top:4px}
.stat-s.up{color:#3DAA70}

/* Grid & Cards */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.g3{display:grid;grid-template-columns:2fr 1fr;gap:1rem;margin-bottom:1rem}
.card{
  border-radius: 18px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.08);
  background:var(--bg2);border:1px solid var(--br2);border-radius:14px;padding:1.2rem;
  transition:border-color .2s;
}
.card:hover{border-color:rgba(212,175,55,.2)}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.card-t{font-size:14px;font-weight:700;color:var(--tx);font-family:'Amiri',serif}
.card-b{padding:5px 12px;background:var(--gl);border:1px solid var(--br);border-radius:7px;color:var(--g);font-family:'Tajawal',sans-serif;font-size:12px;cursor:pointer;transition:all .15s}
.card-b:hover{background:rgba(212,175,55,.25)}

/* Table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:11px;color:var(--tx3);font-weight:600;padding:6px 10px;border-bottom:1px solid var(--br2);text-align:right;letter-spacing:.03em}
.tbl td{font-size:13px;color:var(--tx);padding:10px;border-bottom:1px solid rgba(255,255,255,.03)}
.tbl tr:last-child td{border:none}
.tbl tbody tr{transition:background .15s;cursor:pointer}
.tbl tbody tr:hover td{background:rgba(212,175,55,.04)}
.cno{color:var(--g);font-weight:700}

/* Badges */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.ba{background:rgba(26,138,74,.15);color:#3DAA70}
.bp{background:rgba(122,90,0,.2);color:#E0B040}
.bc{background:rgba(60,60,80,.25);color:var(--tx2)}
.bu{background:rgba(138,26,42,.2);color:#E07080}

/* Progress */
.pb{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:5px}
.pf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--gd),var(--g))}

/* Timeline */
.tl-l{display:flex;flex-direction:column;gap:12px}
.tl-i{display:flex;gap:11px}
.tl-d{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px;box-shadow:0 0 6px currentColor}
.tl-tt{font-size:13px;color:var(--tx);line-height:1.4}
.tl-ss{font-size:11px;color:var(--tx3);margin-top:2px}

/* Page actions */
.pact{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.2rem}
.add-btn{
  padding:8px 18px;
  background:linear-gradient(135deg,rgba(212,175,55,.15),rgba(122,98,0,.1));
  border:1px solid var(--br);border-radius:10px;
  color:var(--g);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;
  cursor:pointer;transition:all .2s;
}
.add-btn:hover{background:rgba(212,175,55,.25);transform:translateY(-1px);box-shadow:var(--gold-glow)}
.tot{font-size:13px;color:var(--tx2)}
.tot span{color:var(--g);font-weight:700}

/* Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:500;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
.ov.open{display:flex;animation:ovFade .2s ease}
@keyframes ovFade{from{opacity:0}to{opacity:1}}
.modal{
  background:var(--bg2);border:1px solid var(--br);border-radius:20px;
  padding:1.8rem;width:480px;max-height:88vh;overflow-y:auto;
  box-shadow:0 24px 80px rgba(0,0,0,.6);
  animation:modalSlide .3s cubic-bezier(.34,1.56,.64,1);
}
@keyframes modalSlide{from{opacity:0;transform:translateY(30px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.mh{font-size:16px;font-weight:800;color:var(--g);margin-bottom:1.5rem;display:flex;justify-content:space-between;align-items:center;font-family:'Amiri',serif}
.mx{cursor:pointer;color:var(--tx3);font-size:22px;transition:color .15s;line-height:1}
.mx:hover{color:var(--tx)}
.fl{font-size:12px;color:var(--tx2);margin-bottom:4px;display:block;letter-spacing:.02em}
.fi{width:100%;padding:10px 12px;background:var(--bg3);border:1px solid var(--br2);border-radius:9px;color:var(--tx);font-family:'Tajawal',sans-serif;font-size:13px;margin-bottom:12px;outline:none;text-align:right;transition:all .2s}
.fi:focus{border-color:var(--g);box-shadow:0 0 0 3px rgba(212,175,55,.1)}
textarea.fi{resize:vertical;min-height:70px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ma{display:flex;gap:8px;justify-content:flex-end;margin-top:6px}
.btn-c{padding:9px 18px;background:transparent;border:1px solid var(--br2);border-radius:9px;color:var(--tx2);font-family:'Tajawal',sans-serif;font-size:13px;cursor:pointer;transition:all .2s}
.btn-c:hover{border-color:var(--br);color:var(--tx)}
.btn-s{padding:9px 20px;background:linear-gradient(135deg,var(--g),var(--gd));border:none;border-radius:9px;color:#0A0C10;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .2s;box-shadow:0 2px 12px rgba(212,175,55,.3)}
.btn-s:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(212,175,55,.4)}

/* ⑤ إشعارات فاخرة */
.toast-container{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast-item{
  padding:12px 20px;border-radius:12px;font-size:13px;
  font-family:'Tajawal',sans-serif;direction:rtl;
  display:flex;align-items:center;gap:10px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  animation:toastIn .4s cubic-bezier(.34,1.56,.64,1);
  min-width:260px;
}
.toast-item.ok{background:linear-gradient(135deg,rgba(26,80,46,.95),rgba(20,60,36,.95));color:#4DDB80;border:1px solid rgba(61,170,112,.3)}
.toast-item.err{background:linear-gradient(135deg,rgba(80,20,30,.95),rgba(60,15,24,.95));color:#F08090;border:1px solid rgba(224,112,128,.3)}
.toast-item.info{background:linear-gradient(135deg,rgba(20,40,80,.95),rgba(15,30,60,.95));color:#4A9FD9;border:1px solid rgba(74,144,217,.3)}
.toast-ic{font-size:16px;flex-shrink:0}
@keyframes toastIn{from{opacity:0;transform:translateY(20px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(10px)}}

/* ② خلفية الرئيسية - canvas */
#dashboard-canvas{position:absolute;top:0;left:0;pointer-events:none;opacity:.4;z-index:0}
#sec-dashboard{position:relative}
#sec-dashboard>*{position:relative;z-index:1}

/* Kanban */
.kanban-col{background:var(--bg3);border-radius:14px;padding:10px;min-height:200px;border:1px solid var(--br2)}
.kanban-head{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;border-radius:9px;font-size:13px;font-weight:700;margin-bottom:10px;font-family:'Amiri',serif}
.kanban-count{background:rgba(0,0,0,.2);color:inherit;padding:1px 8px;border-radius:10px;font-size:11px}
.kanban-cards{display:flex;flex-direction:column;gap:8px}
.kcard{background:var(--bg2);border:1px solid var(--br2);border-radius:10px;padding:10px;cursor:pointer;transition:all .2s}
.kcard:hover{border-color:var(--g);transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,.3)}
.kcard-num{font-size:10px;color:var(--g);font-weight:700;margin-bottom:3px}
.kcard-title{font-size:12px;font-weight:700;color:var(--tx);margin-bottom:3px}
.kcard-client{font-size:11px;color:var(--tx2)}
.kcard-btns{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap}
.kcard-btn{padding:3px 8px;border-radius:5px;border:0.5px solid var(--br2);background:transparent;font-family:'Tajawal',sans-serif;font-size:10px;cursor:pointer;color:var(--tx2);transition:all .15s}
.kcard-btn:hover{border-color:var(--g);color:var(--g)}
.law-item{padding:9px 12px;background:var(--bg3);border-radius:9px;cursor:pointer;transition:all .15s;border:1px solid transparent}
